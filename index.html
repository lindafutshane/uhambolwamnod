<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6b5ce7">
<title>My Journal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%94%3C/text%3E%3C/svg%3E">

<!-- PWA manifest (inlined as a blob at runtime) -->
<style>
:root{
  --accent:#6b5ce7; --accent-soft:#efedfd; --bg:#f6f5fb; --card:#ffffff;
  --text:#23202e; --muted:#7a7689; --line:#e7e4f0; --danger:#e2554f;
  --shadow:0 6px 24px rgba(60,50,120,.08); --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.5;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:16px}

/* Layout */
.app{max-width:880px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header.topbar{
  position:sticky;top:0;z-index:20;background:rgba(246,245,251,.9);backdrop-filter:blur(10px);
  padding:14px 18px calc(14px + env(safe-area-inset-top)); padding-top:max(14px,env(safe-area-inset-top));
  display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
.brand .logo{font-size:22px}
.topbar .spacer{flex:1}
.gbtn{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
  padding:8px 12px;border-radius:999px;font-size:14px;font-weight:600;color:var(--text)}
.gbtn:hover{border-color:var(--accent)}
.iconbtn{width:40px;height:40px;border-radius:999px;background:var(--card);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.iconbtn:hover{border-color:var(--accent)}

main{flex:1;padding:18px;display:flex;flex-direction:column;gap:18px}

/* Sync status pill */
.syncpill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);
  background:var(--card);border:1px solid var(--line);padding:5px 11px;border-radius:999px;align-self:flex-start}
.dot{width:8px;height:8px;border-radius:50%;background:#bbb}
.dot.local{background:#f0a500}.dot.synced{background:#39b37d}.dot.syncing{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}

/* Composer card */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.composer{padding:16px}
.composer h2{margin:0 0 12px;font-size:15px;color:var(--muted);font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12.5px;color:var(--muted);font-weight:600}
input[type=date],input.titlein{
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fbfaff;color:var(--text)
}
input.titlein{flex:1;min-width:180px}
textarea#body{
  width:100%;min-height:150px;border:1px solid var(--line);border-radius:12px;padding:14px;resize:vertical;
  background:#fbfaff;color:var(--text);line-height:1.6
}
textarea#body:focus,input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}

.emojibar{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0}
.emojibar button{font-size:20px;padding:4px 6px;border-radius:8px;line-height:1}
.emojibar button:hover{background:var(--accent-soft)}
.emojibar .more{font-size:13px;font-weight:600;color:var(--accent);padding:0 8px}

.toolsrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px}
.ghost{border:1px solid var(--line);background:var(--card);padding:9px 14px;border-radius:10px;font-weight:600;font-size:14px;display:inline-flex;gap:7px;align-items:center}
.ghost:hover{border-color:var(--accent);color:var(--accent)}
.primary{background:var(--accent);color:#fff;padding:11px 20px;border-radius:10px;font-weight:700;font-size:15px}
.primary:hover{filter:brightness(1.05)}
.primary:disabled{opacity:.5;cursor:default}
.toolsrow .spacer{flex:1}

.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.thumb{position:relative;width:74px;height:74px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .x{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center}

/* Entries list */
.entries{display:flex;flex-direction:column;gap:14px}
.listhead{display:flex;align-items:center;gap:10px}
.listhead h2{margin:0;font-size:17px}
.listhead .count{color:var(--muted);font-size:14px}
.search{margin-left:auto;border:1px solid var(--line);border-radius:999px;padding:8px 14px;background:var(--card);min-width:140px}

.entry{padding:16px;cursor:default}
.entry .meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.entry .date{font-size:13px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:999px}
.entry .title{font-size:18px;font-weight:700;margin:2px 0 6px}
.entry .text{white-space:pre-wrap;color:#36323f}
.entry .photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.entry .photos img{width:96px;height:96px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
.entry .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.entry .actions button{font-size:13px;font-weight:600;color:var(--muted);padding:6px 11px;border:1px solid var(--line);border-radius:8px}
.entry .actions button:hover{border-color:var(--accent);color:var(--accent)}
.entry .actions .del:hover{border-color:var(--danger);color:var(--danger)}

.empty{text-align:center;color:var(--muted);padding:40px 20px}
.empty .big{font-size:42px;margin-bottom:8px}

/* Modal (settings / emoji full) */
.overlay{position:fixed;inset:0;background:rgba(35,30,55,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:18px;max-width:460px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal .mhead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.modal .mhead h3{margin:0;font-size:17px}
.modal .mhead .x{margin-left:auto;font-size:22px;color:var(--muted)}
.modal .mbody{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.modal label{font-size:13px;font-weight:600;color:var(--muted)}
.modal input[type=text]{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px;background:#fbfaff}
.help{font-size:13px;color:var(--muted);line-height:1.6}
.help a{color:var(--accent)}
.emojigrid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.emojigrid button{font-size:22px;padding:6px 0;border-radius:8px}
.emojigrid button:hover{background:var(--accent-soft)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#23202e;color:#fff;
  padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;transition:.25s;z-index:80;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:560px){
  main{padding:14px}
  .entry .photos img{width:30%;height:auto;aspect-ratio:1}
  .search{min-width:110px}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><span class="logo">📔</span><span>My Journal</span></div>
    <div class="spacer"></div>
    <span id="syncPill" class="syncpill"><span id="syncDot" class="dot local"></span><span id="syncText">On this device</span></span>
    <button class="iconbtn" id="settingsBtn" title="Settings">⚙️</button>
    <button class="gbtn" id="authBtn">Sign in</button>
  </header>

  <main>
    <!-- Composer -->
    <section class="card composer">
      <h2 id="composerTitle">New entry</h2>
      <div class="row">
        <div class="field">
          <label for="entryDate">Date</label>
          <input type="date" id="entryDate">
        </div>
        <div class="field" style="flex:1">
          <label for="entryTitle">Title (optional)</label>
          <input type="text" id="entryTitle" class="titlein" placeholder="A line to remember this by…">
        </div>
      </div>
      <textarea id="body" placeholder="What's on your mind today?"></textarea>

      <div class="emojibar" id="emojiBar"></div>

      <div class="thumbs" id="thumbs"></div>

      <div class="toolsrow">
        <button class="ghost" id="photoBtn">🖼️ Add photos</button>
        <input type="file" id="photoInput" accept="image/*" multiple hidden>
        <button class="ghost" id="cancelEdit" style="display:none">Cancel edit</button>
        <div class="spacer"></div>
        <button class="primary" id="saveBtn">Save entry</button>
      </div>
    </section>

    <!-- Entries -->
    <section class="entries">
      <div class="listhead">
        <h2>Entries</h2><span class="count" id="count">0</span>
        <input type="search" class="search" id="search" placeholder="Search…">
      </div>
      <div id="list"></div>
    </section>
  </main>
</div>

<!-- Settings modal -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="mhead"><h3>⚙️ Settings</h3><button class="x" data-close>×</button></div>
    <div class="mbody">
      <div>
        <label for="clientId">Google OAuth Client ID</label>
        <input type="text" id="clientId" placeholder="xxxxxxxx.apps.googleusercontent.com">
        <p class="help">Paste the Client ID from your Google Cloud project to enable sign-in and Drive sync across devices. See the included <strong>SETUP-GUIDE</strong> for the 5-minute steps. Leave blank to keep everything on this device only.</p>
      </div>
      <div class="row" style="gap:10px">
        <button class="ghost" id="exportAll">⬇️ Export all (JSON backup)</button>
        <button class="ghost" id="importBtn">⬆️ Import backup</button>
        <input type="file" id="importInput" accept="application/json" hidden>
      </div>
      <button class="primary" id="saveSettings">Save settings</button>
    </div>
  </div>
</div>

<!-- PDF export options modal -->
<div class="overlay" id="pdfOverlay">
  <div class="modal">
    <div class="mhead"><h3>📄 Download PDF</h3><button class="x" data-close>×</button></div>
    <div class="mbody">
      <p class="help" id="pdfEntryLabel" style="margin:0"></p>
      <label style="display:flex;align-items:center;gap:10px;font-size:15px;color:var(--text);cursor:pointer">
        <input type="checkbox" id="pdfIncludePhotos" style="width:18px;height:18px;accent-color:var(--accent)">
        Include photos in the PDF
      </label>
      <p class="help" id="pdfPhotoNote" style="margin:0"></p>
      <button class="primary" id="pdfGo">Download PDF</button>
    </div>
  </div>
</div>

<!-- Full emoji modal -->
<div class="overlay" id="emojiOverlay">
  <div class="modal">
    <div class="mhead"><h3>Pick an emoji</h3><button class="x" data-close>×</button></div>
    <div class="mbody"><div class="emojigrid" id="emojiGrid"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Google libraries (only used once a Client ID is configured) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<!-- PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
"use strict";
/* ============================================================
   My Journal — single-file web/mobile app
   Storage: local-first (localStorage) with optional Google Drive sync.
   ============================================================ */

const LS_ENTRIES = "journal.entries.v1";
const LS_CLIENTID = "journal.googleClientId";
const LS_PDFPHOTOS = "journal.pdfIncludePhotos";  // "1" / "0"
const DRIVE_FILENAME = "journal-data.json";   // stored in Drive appDataFolder
const SCOPES = "https://www.googleapis.com/auth/drive.appdata";

let entries = [];          // [{id, date, title, body, photos:[dataURL], updated}]
let draftPhotos = [];      // photos staged in composer
let editingId = null;      // entry being edited, or null
// Your Google OAuth Client ID is baked in so EVERY device works with zero per-device setup.
// (A Client ID is a public identifier — safe to include in the page.)
const DEFAULT_CLIENT_ID = "1033173407311-s4nf1e5hekohneso9n5pura3aqdi4rm4.apps.googleusercontent.com";
// Always trust the baked-in ID; ignore any stale/corrupted value a device may have saved before.
let clientId = DEFAULT_CLIENT_ID;
try{ localStorage.setItem(LS_CLIENTID, DEFAULT_CLIENT_ID); }catch(e){}
let tokenClient = null;
let accessToken = null;
let gapiReady = false, gisReady = false;
let driveFileId = null;

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function todayISO(){ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); }
function fmtDate(iso){
  if(!iso) return "";
  const [y,m,d] = iso.split("-").map(Number);
  const dt = new Date(y,m-1,d);
  return dt.toLocaleDateString(undefined,{weekday:"short",year:"numeric",month:"long",day:"numeric"});
}
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- persistence ---------- */
function loadLocal(){ try{ entries = JSON.parse(localStorage.getItem(LS_ENTRIES)) || []; }catch(e){ entries=[]; } }
function saveLocal(){ localStorage.setItem(LS_ENTRIES, JSON.stringify(entries)); }
function persist(){ saveLocal(); render(); if(accessToken) syncToDrive(); }

/* ---------- emoji ---------- */
const QUICK_EMOJI = ["😀","😊","😍","🥰","😎","🤔","😢","😭","😡","😴","🥳","😌","🙏","💪","🔥","✨","❤️","💜","🌟","☀️","🌧️","🌈","🌙","🍀","🌸","☕","🎉","📌","✅","💡"];
const FULL_EMOJI = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🥸","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","💀","👻","💩","🤡","👽","🙏","💪","👍","👎","👏","🙌","🤝","✌️","🤞","🤟","🤙","👋","✋","🖐️","👌","🫶","❤️","🧡","💛","💚","💙","💜","🤎","🖤","🤍","💔","❣️","💕","💞","💓","💗","💖","💘","💝","🔥","✨","⭐","🌟","💫","⚡","☀️","🌤️","⛅","🌧️","⛈️","🌈","❄️","🌙","⭐","🌸","🌷","🌹","🌻","🌼","🍀","🌱","🌲","🌳","🍂","🍁","☕","🍵","🍷","🍰","🎂","🍫","🎉","🎊","🎈","🎁","🏆","🥇","📌","📍","✅","☑️","❌","➡️","⬅️","💡","📖","✏️","📝","🗓️","⏰","🎵","🎶","🏃","🚶","🧘","💤","🌍","🏠","✈️","🚗","🏖️","⛰️","🌊"];

function buildEmojiBar(){
  const bar = $("#emojiBar"); bar.innerHTML="";
  QUICK_EMOJI.forEach(e=>{ const b=document.createElement("button"); b.type="button"; b.textContent=e; b.onclick=()=>insertEmoji(e); bar.appendChild(b); });
  const more=document.createElement("button"); more.type="button"; more.className="more"; more.textContent="more ▾"; more.onclick=openEmoji; bar.appendChild(more);
}
function buildEmojiGrid(){
  const g=$("#emojiGrid"); g.innerHTML="";
  FULL_EMOJI.forEach(e=>{ const b=document.createElement("button"); b.type="button"; b.textContent=e; b.onclick=()=>{ insertEmoji(e); closeOverlays(); }; g.appendChild(b); });
}
function insertEmoji(e){
  const ta=$("#body"); const s=ta.selectionStart??ta.value.length, en=ta.selectionEnd??ta.value.length;
  ta.value = ta.value.slice(0,s)+e+ta.value.slice(en); ta.focus();
  const pos=s+e.length; ta.setSelectionRange(pos,pos);
}

/* ---------- photos ---------- */
function fileToDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
// Downscale large images so storage/sync stays light.
function downscale(dataURL, max=1280, quality=0.82){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",quality));
    };
    img.onerror=()=>res(dataURL);
    img.src=dataURL;
  });
}
async function handleFiles(files){
  for(const f of files){
    if(!f.type.startsWith("image/")) continue;
    const raw=await fileToDataURL(f);
    const small=await downscale(raw);
    draftPhotos.push(small);
  }
  renderThumbs();
}
function renderThumbs(){
  const t=$("#thumbs"); t.innerHTML="";
  draftPhotos.forEach((p,i)=>{
    const d=document.createElement("div"); d.className="thumb";
    d.innerHTML=`<img src="${p}"><button class="x" type="button" title="Remove">×</button>`;
    d.querySelector(".x").onclick=()=>{ draftPhotos.splice(i,1); renderThumbs(); };
    t.appendChild(d);
  });
}

/* ---------- composer ---------- */
function resetComposer(){
  editingId=null; draftPhotos=[];
  $("#entryDate").value=todayISO();
  $("#entryTitle").value=""; $("#body").value="";
  $("#composerTitle").textContent="New entry";
  $("#saveBtn").textContent="Save entry";
  $("#cancelEdit").style.display="none";
  renderThumbs();
}
function saveEntry(){
  const date=$("#entryDate").value||todayISO();
  const title=$("#entryTitle").value.trim();
  const body=$("#body").value.trim();
  if(!body && !title && draftPhotos.length===0){ toast("Write something first ✍️"); return; }
  if(editingId){
    const e=entries.find(x=>x.id===editingId);
    Object.assign(e,{date,title,body,photos:[...draftPhotos],updated:Date.now()});
    toast("Entry updated");
  }else{
    entries.push({id:uid(),date,title,body,photos:[...draftPhotos],updated:Date.now()});
    toast("Entry saved");
  }
  resetComposer(); persist();
}
function editEntry(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  editingId=id; draftPhotos=[...e.photos];
  $("#entryDate").value=e.date; $("#entryTitle").value=e.title||""; $("#body").value=e.body||"";
  $("#composerTitle").textContent="Edit entry"; $("#saveBtn").textContent="Update entry";
  $("#cancelEdit").style.display=""; renderThumbs();
  window.scrollTo({top:0,behavior:"smooth"});
}
function deleteEntry(id){
  if(!confirm("Delete this entry? This can't be undone.")) return;
  entries=entries.filter(x=>x.id!==id);
  if(editingId===id) resetComposer();
  toast("Entry deleted"); persist();
}

/* ---------- render ---------- */
function sortedEntries(){
  return [...entries].sort((a,b)=> (b.date.localeCompare(a.date)) || (b.updated-a.updated));
}
function render(){
  const q=($("#search").value||"").toLowerCase().trim();
  let list=sortedEntries();
  if(q) list=list.filter(e=>((e.title||"")+" "+(e.body||"")+" "+e.date).toLowerCase().includes(q));
  $("#count").textContent=entries.length;
  const el=$("#list");
  if(list.length===0){
    el.innerHTML=`<div class="card empty"><div class="big">🌱</div>${q?"No entries match your search.":"No entries yet — your first thought goes a long way."}</div>`;
    return;
  }
  el.innerHTML="";
  list.forEach(e=>{
    const card=document.createElement("div"); card.className="card entry";
    const photos=(e.photos||[]).map(p=>`<img src="${p}" alt="photo">`).join("");
    card.innerHTML=`
      <div class="meta"><span class="date">${fmtDate(e.date)}</span></div>
      ${e.title?`<div class="title">${escapeHtml(e.title)}</div>`:""}
      <div class="text">${escapeHtml(e.body)}</div>
      ${photos?`<div class="photos">${photos}</div>`:""}
      <div class="actions">
        <button data-act="pdf">⬇️ PDF</button>
        <button data-act="edit">✏️ Edit</button>
        <button data-act="del" class="del">🗑️ Delete</button>
      </div>`;
    card.querySelector('[data-act="edit"]').onclick=()=>editEntry(e.id);
    card.querySelector('[data-act="del"]').onclick=()=>deleteEntry(e.id);
    card.querySelector('[data-act="pdf"]').onclick=()=>openPdfChooser(e);
    el.appendChild(card);
  });
}

/* ---------- PDF export ---------- */
// Open the chooser. If the entry has no photos there's nothing to toggle, so export directly.
let pdfTarget=null;
function openPdfChooser(entry){
  const hasPhotos=(entry.photos||[]).length>0;
  if(!hasPhotos){ exportPDF(entry,false); return; }
  pdfTarget=entry;
  const pref=localStorage.getItem(LS_PDFPHOTOS);
  $("#pdfIncludePhotos").checked = pref===null ? true : pref==="1";
  const n=entry.photos.length;
  $("#pdfEntryLabel").textContent=`${fmtDate(entry.date)}${entry.title?" — "+entry.title:""}`;
  $("#pdfPhotoNote").textContent=`This entry has ${n} photo${n>1?"s":""}. Untick to print a text-only version.`;
  $("#pdfOverlay").classList.add("open");
}

/* one entry per page */
async function exportPDF(entry, includePhotos){
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const M=56;                       // margin
  const cw=pageW-M*2;               // content width
  let y=M;

  function ensure(space){ if(y+space>pageH-M){ doc.addPage(); y=M; } }

  // Header: date
  doc.setFont("helvetica","bold"); doc.setTextColor(107,92,231); doc.setFontSize(13);
  doc.text(fmtDate(entry.date), M, y); y+=10;
  doc.setDrawColor(231,228,240); doc.setLineWidth(1); doc.line(M,y,pageW-M,y); y+=22;

  // Title
  if(entry.title){
    doc.setFont("helvetica","bold"); doc.setTextColor(35,32,46); doc.setFontSize(20);
    const tl=doc.splitTextToSize(entry.title, cw);
    tl.forEach(line=>{ ensure(26); doc.text(line,M,y); y+=26; });
    y+=6;
  }

  // Body
  doc.setFont("helvetica","normal"); doc.setTextColor(54,50,63); doc.setFontSize(12);
  const bodyLines=doc.splitTextToSize(entry.body||"", cw);
  bodyLines.forEach(line=>{ ensure(18); doc.text(line,M,y); y+=18; });

  // Photos (optional)
  const photos = includePhotos ? (entry.photos||[]) : [];
  for(const p of photos){
    const dims=await imgDims(p);
    let w=cw, h=w*(dims.h/dims.w);
    const maxH=pageH-M*2;
    if(h>maxH){ h=maxH; w=h*(dims.w/dims.h); }
    ensure(h+18); y+=10;
    try{ doc.addImage(p,"JPEG",M,y,w,h); }catch(e){ try{ doc.addImage(p,"PNG",M,y,w,h);}catch(_){} }
    y+=h+8;
  }

  const safeDate=(entry.date||"entry");
  const safeTitle=(entry.title||"journal").replace(/[^\w-]+/g,"-").slice(0,40);
  doc.save(`${safeDate}_${safeTitle}.pdf`);
  toast("PDF downloaded 📄");
}
function imgDims(src){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res({w:i.naturalWidth,h:i.naturalHeight}); i.onerror=()=>res({w:1,h:1}); i.src=src; }); }

/* ---------- backup import/export ---------- */
function exportAll(){
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`journal-backup-${todayISO()}.json`; a.click(); URL.revokeObjectURL(a.href);
  toast("Backup downloaded");
}
async function importBackup(file){
  try{
    const data=JSON.parse(await file.text());
    if(!Array.isArray(data)) throw 0;
    const ids=new Set(entries.map(e=>e.id));
    data.forEach(e=>{ if(e&&e.id&&!ids.has(e.id)) entries.push(e); });
    persist(); toast("Backup imported");
  }catch(e){ toast("Couldn't read that file"); }
}

/* ============================================================
   GOOGLE SIGN-IN + DRIVE SYNC
   ============================================================ */
function setSync(state, text){
  const dot=$("#syncDot"); dot.className="dot "+state;
  $("#syncText").textContent=text;
}
window.gapiLoaded=()=>{};
function tryInitGoogle(){
  if(!clientId){ setSync("local","On this device"); $("#authBtn").textContent="Sign in"; return; }
  // init gapi client
  if(window.gapi && !gapiReady){
    gapi.load("client",async()=>{
      await gapi.client.init({discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
      gapiReady=true;
    });
  }
  // init token client
  if(window.google?.accounts?.oauth2 && !tokenClient){
    try{
      tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:clientId, scope:SCOPES,
        callback:(resp)=>{
          if(resp.error){ toast("Sign-in failed"); return; }
          accessToken=resp.access_token;
          gapi.client.setToken({access_token:accessToken});
          $("#authBtn").textContent="Sign out";
          setSync("syncing","Syncing…");
          afterSignIn();
        }
      });
      gisReady=true;
    }catch(e){ console.warn(e); }
  }
}
function signIn(){
  if(!clientId){ openSettings(); toast("Add your Google Client ID first"); return; }
  if(!tokenClient){ tryInitGoogle(); setTimeout(()=>tokenClient&&tokenClient.requestAccessToken(),600); return; }
  if(accessToken){ // sign out
    google.accounts.oauth2.revoke(accessToken,()=>{});
    accessToken=null; driveFileId=null; gapi.client.setToken(null);
    $("#authBtn").textContent="Sign in"; setSync("local","On this device"); toast("Signed out");
    return;
  }
  tokenClient.requestAccessToken();
}
async function afterSignIn(){
  try{
    await findDriveFile();
    if(driveFileId){
      const remote=await readDriveFile();
      mergeRemote(remote);
    }
    await syncToDrive();
    setSync("synced","Synced to Drive"); toast("Connected to Google Drive ☁️");
  }catch(e){ console.warn(e); setSync("local","Sync error — saved locally"); }
}
async function findDriveFile(){
  const r=await gapi.client.drive.files.list({spaces:"appDataFolder",fields:"files(id,name)",q:`name='${DRIVE_FILENAME}'`});
  driveFileId=r.result.files?.[0]?.id||null;
}
async function readDriveFile(){
  const r=await gapi.client.drive.files.get({fileId:driveFileId,alt:"media"});
  try{ return JSON.parse(r.body); }catch(e){ return []; }
}
function mergeRemote(remote){
  if(!Array.isArray(remote)) return;
  const byId=new Map(entries.map(e=>[e.id,e]));
  remote.forEach(r=>{
    const local=byId.get(r.id);
    if(!local){ entries.push(r); byId.set(r.id,r); }
    else if((r.updated||0)>(local.updated||0)){ Object.assign(local,r); }
  });
  saveLocal(); render();
}
let syncTimer=null;
function syncToDrive(){
  if(!accessToken) return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(_syncNow,800); // debounce
}
async function _syncNow(){
  if(!accessToken) return;
  setSync("syncing","Syncing…");
  const content=JSON.stringify(entries);
  const meta={name:DRIVE_FILENAME, parents:driveFileId?undefined:["appDataFolder"]};
  const boundary="-------journal"+Date.now();
  const body=
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`+
    JSON.stringify(driveFileId?{name:DRIVE_FILENAME}:meta)+
    `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n`+content+`\r\n--${boundary}--`;
  const method=driveFileId?"PATCH":"POST";
  const url=driveFileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  try{
    const res=await fetch(url,{method,headers:{Authorization:"Bearer "+accessToken,"Content-Type":`multipart/related; boundary=${boundary}`},body});
    const j=await res.json();
    if(j.id) driveFileId=j.id;
    setSync("synced","Synced to Drive");
  }catch(e){ console.warn(e); setSync("local","Sync error — saved locally"); }
}

/* ---------- modals ---------- */
function openSettings(){ $("#clientId").value=clientId; $("#settingsOverlay").classList.add("open"); }
function openEmoji(){ $("#emojiOverlay").classList.add("open"); }
function closeOverlays(){ document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("open")); }

/* ---------- wire up ---------- */
function init(){
  loadLocal();
  buildEmojiBar(); buildEmojiGrid();
  resetComposer(); render();

  $("#saveBtn").onclick=saveEntry;
  $("#cancelEdit").onclick=resetComposer;
  $("#photoBtn").onclick=()=>$("#photoInput").click();
  $("#photoInput").onchange=e=>{ handleFiles(e.target.files); e.target.value=""; };
  $("#search").oninput=render;
  $("#authBtn").onclick=signIn;

  $("#settingsBtn").onclick=openSettings;
  $("#saveSettings").onclick=()=>{
    const newId=$("#clientId").value.trim();
    const changed = newId!==clientId;
    clientId=newId;
    localStorage.setItem(LS_CLIENTID,clientId);
    // If the Client ID changed, drop any token client built from the old one
    // so the next sign-in uses the new ID (fixes 401 invalid_client after editing).
    if(changed){
      if(accessToken){ try{ google.accounts.oauth2.revoke(accessToken,()=>{}); }catch(e){} }
      accessToken=null; tokenClient=null; driveFileId=null;
      if(window.gapi&&gapi.client) gapi.client.setToken(null);
      $("#authBtn").textContent="Sign in"; setSync("local","On this device");
    }
    closeOverlays(); tryInitGoogle();
    toast(clientId?"Saved — tap Sign in to connect Drive":"Saved (local only)");
  };
  $("#pdfGo").onclick=()=>{
    const inc=$("#pdfIncludePhotos").checked;
    localStorage.setItem(LS_PDFPHOTOS, inc?"1":"0");
    closeOverlays();
    if(pdfTarget) exportPDF(pdfTarget, inc);
  };

  $("#exportAll").onclick=exportAll;
  $("#importBtn").onclick=()=>$("#importInput").click();
  $("#importInput").onchange=e=>{ if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value=""; };
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeOverlays);
  document.querySelectorAll(".overlay").forEach(o=>o.addEventListener("click",e=>{ if(e.target===o) closeOverlays(); }));

  // Keyboard: Ctrl/Cmd+Enter saves
  $("#body").addEventListener("keydown",e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") saveEntry(); });

  // Try Google init after libs load
  let tries=0; const t=setInterval(()=>{ tries++; if((window.google&&window.gapi)||tries>40){ clearInterval(t); tryInitGoogle(); } },300);

  // Register a tiny service worker for installability (works when hosted).
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    const swCode=`self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",()=>{});`;
    const swURL=URL.createObjectURL(new Blob([swCode],{type:"text/javascript"}));
    navigator.serviceWorker.register(swURL).catch(()=>{});
  }
  // Inject a web app manifest so it can be installed to a home screen.
  const manifest={name:"My Journal",short_name:"Journal",display:"standalone",background_color:"#f6f5fb",theme_color:"#6b5ce7",start_url:".",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236b5ce7'/%3E%3Ctext y='.9em' x='12' font-size='70'%3E%F0%9F%93%94%3C/text%3E%3C/svg%3E",sizes:"any",type:"image/svg+xml"}]};
  const ml=document.createElement("link"); ml.rel="manifest";
  ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/json"}));
  document.head.appendChild(ml);
}
document.addEventListener("DOMContentLoaded",init);
</script>
